interface:
  display_name: "M365 Mail Agent fuer tiefe Fallanalyse und Drafts"
  short_description: "Analysiert einen Mail-Fall agentisch, steuert Retrieval iterativ und nutzt Skripte nur fuer technische Persistenz"
  default_prompt: "Nutze $skill-m365-mail-agent agent-first: waehle die Seed-Mail belastbar aus, plane iterativ Mail- und Kalender-Queries selbst, bewerte die Treffer eigenstaendig und erzeuge nur Drafts. Fuer Folgefragen sollst du nach Moeglichkeit denselben Case fortsetzen statt die Seed-Mail neu zu suchen; nutze dafuer den aktiven Case oder `--case-id`/Resume-Pfade. Behandle fachliche Aussagen aus Mails standardmaessig als zu pruefende Behauptungen statt als Fakten, suche aktiv nach Widerspruechen, fehlender Evidenz und Gegenbelegen und nutze bei VOBES/Bordnetz/e42-Themen verpflichtend die vorhandenen Fach-Skills und Evidenzquellen. Formuliere die finale Analyse frei und kritisch, ohne separate Zusammenfassungssektion; TL;DR darf am Ende erarbeitet werden, wird aber am Dokumentanfang gerendert. Wenn eine Entscheidungsmatrix sinnvoll ist, bewerte auch Aufwand Anwender und Aufwand Softwareaenderungen. Verwende die Python-Skripte nur fuer Graph-Zugriff, Rendering, Case-Ablage, Resume und Trace-Logging."
