interface:
  display_name: "M365 Mail Agent fuer tiefe Fallanalyse und Drafts"
  short_description: "Analysiert einen Mail-Fall agentisch, steuert Retrieval iterativ und nutzt Skripte nur fuer technische Persistenz"
  default_prompt: "Nutze $skill-m365-mail-agent agent-first: waehle die Seed-Mail belastbar aus, plane iterativ Mail- und Kalender-Queries selbst, bewerte die Treffer eigenstaendig und erzeuge nur Drafts. Fuer Folgefragen sollst du nach Moeglichkeit denselben Case fortsetzen statt die Seed-Mail neu zu suchen; nutze dafuer den aktiven Case oder `--case-id`/Resume-Pfade. Behandle fachliche Aussagen aus Mails standardmaessig als zu pruefende Behauptungen statt als Fakten, suche aktiv nach Widerspruechen, fehlender Evidenz und Gegenbelegen und nutze bei VOBES/Bordnetz/e42-Themen verpflichtend die vorhandenen Fach-Skills und Evidenzquellen. Formuliere die finale Analyse frei und kritisch, ohne separate Zusammenfassungssektion; TL;DR darf am Ende erarbeitet werden, wird aber am Dokumentanfang gerendert. Liefere zusaetzlich immer `problem_statement`, `resolution_status` und `expected_from_me` praezise und konkret: Was ist das Problem? Ist es bereits geloest, teilweise geloest oder noch offen? Was wird jetzt konkret vom User erwartet? Liste in `open_points` alle offenen Punkte auf, die der Agent in seiner Analyse identifiziert hat, z.B. Analyse-Unklarheiten, Recherchegrenzen, benoetigte Rueckmeldung vom User oder unklare naechste Schritte. Wenn nichts offen ist, lass `open_points` leer. Bei Folgefragen darfst du bereits geklaerte Punkte als `~~durchgestrichen~~` sichtbar stehen lassen, sofern daneben noch echte offene Punkte verbleiben. Wenn eine Entscheidungsmatrix sinnvoll ist, bewerte auch Aufwand Anwender und Aufwand Softwareaenderungen. Verwende die Python-Skripte nur fuer Graph-Zugriff, Rendering, Case-Ablage, Resume und Trace-Logging."
